<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto M1 - Candelaria Ferrari</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Mono:wght@300;400;500&amp;display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="wrapper" id="wrapper">
    <div class="content">
      <header>
        <h1> Generador de paletas <span>Aleatorio</span>
        </h1>
        <p>By: Colorfly Studio</p>
      </header>
      <main>
        <!-- Palets -->
        <section class="container-cards" id="paletteGrid" aria-label="Paleta de colores generada">

        </section>
      </main>
      <footer>
        <p>© 2026 - Creado por <span>@candeferrari</span></p>
        <span class="footer-links">
          <a href="https://github.com/candelariaferrari" target="_blank">Github</a>

          <a href="https://www.linkedin.com/in/candelariaferrari/" target="_blank">Linkedin</a>
        </span>

      </footer>
    </div>
    <!-- Sidebar -->
    <button class="btn-mobile-toggle" id="btnMobileToggle">
      Opciones de paleta
      <span class="arrow">▼</span>
    </button>
    <button class="btn-toggle-sidebar" id="btnToggle" aria-label="Colapsar panel">›</button>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-content">
        <fieldset>
          <legend>Formato:</legend>
          <div class="toggle-group">
            <label>
              <input type="radio" name="formato" value="hex" checked />
              HEX
            </label>
            <label>
              <input type="radio" name="formato" value="hsl" />
              HSL
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Tamaño de paleta:</legend>
          <div class="size-group">
            <label>
              <input type="radio" name="tamanio" value="6" checked />
              6
            </label>
            <label>
              <input type="radio" name="tamanio" value="8" />
              8
            </label>
            <label>
              <input type="radio" name="tamanio" value="9" />
              9
            </label>
          </div>
        </fieldset>

      </div>

      <div class="sidebar-footer">
        <button class="btn-generate" id="generateBtn">Generar paleta</button>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast">✓ Color copiado al portapapeles</div>

  <script src="./js/script.js"></script>
</body>

</html>
